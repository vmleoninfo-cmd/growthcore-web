server {
    listen 3000;
    listen [::]:3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (heredados por todas las locations) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://connect.facebook.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://crm.usegrowthcore.com https://www.google-analytics.com https://analytics.google.com https://*.google-analytics.com https://*.analytics.google.com https://stats.g.doubleclick.net https://connect.facebook.net https://www.facebook.com; frame-src https://www.facebook.com https://td.doubleclick.net;" always;

    # Cache largo para assets (expires no rompe la herencia de add_header)
    location ~* \.(js|css|woff2|woff|png|webp|svg|ico|jpg|jpeg)$ {
        expires 30d;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # 404 con marca
    error_page 404 /404.html;
    location = /404.html { internal; }
}
